  - id: "research"
    label: "Research"
    title: "Research Tracks"
    description: "The research themes behind Kinelo and the project portfolio."
    items:
      - title: "Clinical AI Copilot"
        subtitle: "Therapist reasoning support"
        description: "How AI can assist assessment, documentation, follow-up, and clinical decision loops without replacing clinician judgment."
        meta: "Research axis"
        status: "In progress"

      - title: "Human State Infrastructure"
        subtitle: "Movement as clinical state data"
        description: "A framework for turning observation, movement, symptoms, context, and therapist judgment into reusable state signals."
        meta: "Research axis"
        status: "In progress"

      - title: "Facial Muscle Assessment"
        subtitle: "Face Fitness research line"
        description: "Facial landmark dynamics, activation symmetry, and clinically understandable feedback for facial exercise and screening."
        url: "https://face-fitness.vercel.app"
        meta: "Applied study"
        status: "Demo"

      - title: "Finger Tapping & Parkinsonism"
        subtitle: "Motor timing and fatigue"
        description: "Finger tapping speed, rhythm, decrement, and variability as lightweight motor-function signals."
        url: "https://finger-tap-fx.vercel.app"
        meta: "Applied study"
        status: "Demo"

      - title: "Digital Twin for Rehabilitation"
        subtitle: "Clinical workflow and multimodal AI"
        description: "Patient-specific rehabilitation state models using multimodal assessment, longitudinal tracking, and therapist review."
        meta: "Literature track"
        status: "Notes"

      - title: "Lifting, Gait, and Movement Quality"
        subtitle: "Physical therapy assessment signals"
        description: "Movement variability, trunk strategy, gait speed, lifting mechanics, and return-to-activity signals."
        meta: "Literature track"
        status: "Notes"

