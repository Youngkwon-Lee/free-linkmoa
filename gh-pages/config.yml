  - id: "research"
    label: "Research"
    title: "Research Tracks"
    description: "The research themes behind Kinelo and the project portfolio."
    items:
      - title: "Clinical AI Copilot"
        subtitle: "Therapist reasoning support"
        description: "How AI can assist assessment, documentation, follow-up, and clinical decision loops without replacing clinician judgment."
        meta: "Research axis"
        status: "In progress"

      - title: "Human State Infrastructure"
        subtitle: "Movement as clinical state data"
        description: "A framework for turning observation, movement, symptoms, context, and therapist judgment into reusable state signals."
        meta: "Research axis"
        status: "In progress"

      - title: "Facial Muscle Assessment"
        subtitle: "Face Fitness research line"
        description: "Facial landmark dynamics, activation symmetry, and clinically understandable feedback for facial exercise and screening."
        url: "https://face-fitness.vercel.app"
        meta: "Applied study"
        status: "Demo"

      - title: "Finger Tapping & Parkinsonism"
        subtitle: "Motor timing and fatigue"
        description: "Finger tapping speed, rhythm, decrement, and variability as lightweight motor-function signals."
        url: "https://finger-tap-fx.vercel.app"
        meta: "Applied study"
        status: "Demo"

      - title: "Hawkeye"
        subtitle: "Parkinson video assessment research"
        description: "Clinician-facing objective assessment, reliability support, and longitudinal tracking for Parkinson motor tasks."
        url: "https://github.com/Youngkwon-Lee/Hawkeye_paper"
        meta: "Research project"
        status: "Repo"

      - title: "VisualPRM"
        subtitle: "Medical VQA and PRM selection"
        description: "Medical reasoning data builder that connects candidate generation, step-level scoring, visual-grounded RAG, and review UI."
        url: "https://github.com/Youngkwon-Lee/visualprm-medical-prm"
        meta: "Research project"
        status: "Repo"

      - title: "Med-PRM / VL"
        subtitle: "Medical process reward modeling"
        description: "Open research direction around visual-language reasoning, medical VQA, and process-level supervision."
        url: "https://github.com/Youngkwon-Lee/med-prm-vl"
        meta: "Research repo"
        status: "Repo"

      - title: "Digital Twin for Rehabilitation"
        subtitle: "Clinical workflow and multimodal AI"
        description: "Patient-specific rehabilitation state models using multimodal assessment, longitudinal tracking, and therapist review."
        meta: "Literature track"
        status: "Notes"

      - title: "Lifting, Gait, and Movement Quality"
        subtitle: "Physical therapy assessment signals"
        description: "Movement variability, trunk strategy, gait speed, lifting mechanics, and return-to-activity signals."
        meta: "Literature track"
        status: "Notes"

      - title: "PD4T Dataset"
        subtitle: "Parkinson action quality assessment"
        description: "Bridge note for Parkinson motor assessment datasets and Hawkeye-related video evaluation."
        meta: "Paper bridge"
        status: "Brain note"

      - title: "PathVQA Dataset"
        subtitle: "Medical VQA dataset anchor"
        description: "Bridge note for pathology visual question answering and VisualPRM dataset grounding."
        meta: "Paper bridge"
        status: "Brain note"

      - title: "Rehab Datasets Review"
        subtitle: "Exercise quality and rehab benchmarks"
        description: "UI-PRMD, KiMoRe, MobiPhysio, FineRehab, and related rehabilitation dataset references."
        meta: "Paper bridge"
        status: "Brain note"

      - title: "Medical RAG Survey"
        subtitle: "Medical and visual-grounded RAG"
        description: "Reference bridge for medical RAG and visual-grounded retrieval patterns."
        meta: "Paper bridge"
        status: "Brain note"

